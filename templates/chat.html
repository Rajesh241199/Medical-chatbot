<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Font Awesome for send/user icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- jQuery for simple AJAX -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="chat-wrapper">

    <div class="chat-card">

        <div class="chat-header">
            <div class="bot-avatar">
                <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" alt="Medical Bot">
                <span class="online-dot"></span>
            </div>

            <div class="header-text">
                <h2>Medical Chatbot</h2>
                <p>Ask me anything from your medical knowledge base</p>
            </div>
        </div>

        <div id="message-area" class="message-area">

            <div class="message-row bot-row">
                <div class="small-avatar">
                    <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" alt="Bot">
                </div>

                <div>
                    <div class="message bot-message">
                        Hello! I am your medical assistant. Ask me a question.
                    </div>
                    <span class="time">Now</span>
                </div>
            </div>

        </div>

        <form id="chat-form" class="chat-input-area">
            <input
                type="text"
                id="user-input"
                name="msg"
                placeholder="Type your message..."
                autocomplete="off"
                required
            >

            <button type="submit" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>

    </div>

</div>

<script>
    const messageArea = document.getElementById("message-area");
    const form = document.getElementById("chat-form");
    const userInput = document.getElementById("user-input");

    function getCurrentTime() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function appendUserMessage(message) {
        const row = document.createElement("div");
        row.className = "message-row user-row";

        row.innerHTML = `
            <div>
                <div class="message user-message">${escapeHtml(message)}</div>
                <span class="time user-time">${getCurrentTime()}</span>
            </div>

            <div class="small-avatar user-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
        `;

        messageArea.appendChild(row);
        scrollToBottom();
    }

    function appendBotMessage(message, loading = false) {
        const row = document.createElement("div");
        row.className = "message-row bot-row";
        if (loading) row.id = "loading-row";

        row.innerHTML = `
            <div class="small-avatar">
                <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" alt="Bot">
            </div>

            <div>
                <div class="message bot-message ${loading ? "typing" : ""}">
                    ${loading ? "<span></span><span></span><span></span>" : escapeHtml(message)}
                </div>
                <span class="time">${getCurrentTime()}</span>
            </div>
        `;

        messageArea.appendChild(row);
        scrollToBottom();
    }

    function removeLoading() {
        const loadingRow = document.getElementById("loading-row");
        if (loadingRow) loadingRow.remove();
    }

    function scrollToBottom() {
        messageArea.scrollTop = messageArea.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.innerText = text;
        return div.innerHTML;
    }

    form.addEventListener("submit", function(event) {
        event.preventDefault();

        const message = userInput.value.trim();
        if (!message) return;

        appendUserMessage(message);
        userInput.value = "";

        appendBotMessage("", true);

        $.ajax({
            type: "POST",
            url: "/get",
            data: { msg: message },
            success: function(response) {
                removeLoading();
                appendBotMessage(response);
            },
            error: function() {
                removeLoading();
                appendBotMessage("Something went wrong. Please try again.");
            }
        });
    });
</script>

</body>
</html>
